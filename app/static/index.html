<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fashion Bot</title>
    <link rel="stylesheet" href="/static/styles.css?v=6" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="Outfit recommender">
        <div class="query-panel">
          <p class="eyebrow">Fashion Bot</p>
          <h1>Build a look from the demo catalog</h1>
          <details class="wardrobe-panel" open>
            <summary>Add wardrobe photo (demo)</summary>
            <form id="wardrobe-upload-form" class="wardrobe-form">
              <div class="wardrobe-grid">
                <div class="field">
                  <label for="wardrobe-user-id">User id</label>
                  <input
                    id="wardrobe-user-id"
                    name="user_id"
                    type="text"
                    value="demo_user"
                    placeholder="e.g. demo_user"
                    autocomplete="off"
                  />
                  <p class="hint">Used to store and retrieve your wardrobe items.</p>
                </div>

                <div class="field">
                  <label for="wardrobe-image">Wardrobe image</label>
                  <input id="wardrobe-image" name="image" type="file" accept="image/*" />
                  <p class="hint">Upload a clear clothing photo on a plain background for best results.</p>
                  <div class="wardrobe-actions">
                    <button id="wardrobe-upload-btn" class="btn primary" type="button">Upload</button>
                    <button id="wardrobe-clear" class="btn subtle" type="button">Clear wardrobe</button>
                  </div>
                </div>
              </div>

              <p id="wardrobe-status" class="status" role="status">Wardrobe ready</p>
            </form>
          </details>
          <form id="recommend-form" class="query-form">
            <label for="query">Style request</label>
            <div class="query-row">
              <input
                id="query"
                name="query"
                type="text"
                autocomplete="off"
                value="Give me a casual men's outfit in blue with sneakers"
              />
              <button type="submit">Recommend</button>
            </div>
          </form>
          <div class="prompt-row" aria-label="Example prompts">
            <button type="button" data-prompt="Give me a casual men's outfit in blue with sneakers">Blue casual</button>
            <button type="button" data-prompt="Build a sharp men's dinner outfit with dark colors">Dinner</button>
            <button type="button" data-prompt="Need a smart casual men's outfit for work">Work</button>
            <button type="button" data-prompt="I want a relaxed men's outfit with shorts and sneakers">Weekend</button>
          </div>
          <p id="status" class="status" role="status">Ready</p>
        </div>

        <section id="results" class="results" aria-live="polite"></section>
      </section>
    </main>
    <script src="/static/app.js?v=5"></script>
  </body>
</html>
